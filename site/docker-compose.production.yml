# =============================================================================
# PRODUCTION DOCKER COMPOSE
# =============================================================================
# Runs the site with automatic HTTPS via Let's Encrypt.
# Requires a .env file with SITE_ADDRESS and ACME_EMAIL set.
#
# Usage:
#   cp .env.example .env   # then edit values
#   docker compose -f docker-compose.production.yml up -d --build
# =============================================================================

include:
  - path: observability/docker-compose.yml
  - path: notifications/docker-compose.yml
  - path: planespotter/docker-compose.yml
  - path: evm/docker-compose.yml
  - path: equicalendar/docker-compose.yml
  - path: greenscope/docker-compose.yml
  - path: showback/docker-compose.yml
  - path: vcf-green-insight/docker-compose.yml

services:
  meweb:
    image: ghcr.io/darrylcauldwell/meweb:latest
    container_name: meweb
    init: true
    restart: unless-stopped
    ports:
      - "0.0.0.0:80:80"
      - "0.0.0.0:443:443"
    environment:
      - SITE_ADDRESS=${SITE_ADDRESS}
      - ACME_EMAIL=${ACME_EMAIL}
      - NTFY_ADDRESS=${NTFY_ADDRESS}
      - PLANESPOTTER_ADDRESS=${PLANESPOTTER_ADDRESS}
      - EVM_ADDRESS=${EVM_ADDRESS}
      - EQUICALENDAR_ADDRESS=${EQUICALENDAR_ADDRESS}
      - SUPPORT_ADDRESS=${SUPPORT_ADDRESS}
      - WWW_ADDRESS=${WWW_ADDRESS}
      - CV_ADDRESS=${CV_ADDRESS}
      - BIO_ADDRESS=${BIO_ADDRESS}
      - PRESENTATIONS_ADDRESS=${PRESENTATIONS_ADDRESS}
      - BLOG_ADDRESS=${BLOG_ADDRESS}
      - OBSERVABILITY_ADDRESS=${OBSERVABILITY_ADDRESS}
      - SCI_ADDRESS=${SCI_ADDRESS}
      - FINOPS_ADDRESS=${FINOPS_ADDRESS}
      - VCF_GREEN_INSIGHT_ADDRESS=${VCF_GREEN_INSIGHT_ADDRESS}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - web

networks:
  web:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
