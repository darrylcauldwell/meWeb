# =============================================================================
# GREENSCOPE SERVICES
# =============================================================================
# Software Carbon Intensity dashboard. Included by main docker-compose files.
# =============================================================================

services:
  greenscope:
    build:
      context: /Users/darrylcauldwell/Library/Mobile Documents/com~apple~CloudDocs/Development/greenscope
    image: ghcr.io/darrylcauldwell/greenscope:latest
    container_name: greenscope
    restart: unless-stopped
    environment:
      - GREENSCOPE_PROMETHEUS_URL=${GREENSCOPE_PROMETHEUS_URL:-http://prometheus:9090/prometheus}
      - GREENSCOPE_CARBON_INTENSITY_API_URL=${GREENSCOPE_CARBON_INTENSITY_API_URL:-https://api.carbonintensity.org.uk}
      - GREENSCOPE_CARBON_INTENSITY_FALLBACK=${GREENSCOPE_CARBON_INTENSITY_FALLBACK:-230.0}
      - GREENSCOPE_DATACENTER_POSTCODE=${GREENSCOPE_DATACENTER_POSTCODE:-SL1}
      - GREENSCOPE_HOST_TDP_WATTS=${GREENSCOPE_HOST_TDP_WATTS:-205}
      - GREENSCOPE_HOST_CORES=${GREENSCOPE_HOST_CORES:-2}
      - GREENSCOPE_HOST_PUE=${GREENSCOPE_HOST_PUE:-1.2}
      - GREENSCOPE_HOST_EMBODIED_CO2_KG=${GREENSCOPE_HOST_EMBODIED_CO2_KG:-1205.52}
      - GREENSCOPE_HOST_LIFESPAN_YEARS=${GREENSCOPE_HOST_LIFESPAN_YEARS:-4}
      - GREENSCOPE_APP_BOUNDARIES=${GREENSCOPE_APP_BOUNDARIES:-{}}
      - GREENSCOPE_APP_REQUEST_JOBS=${GREENSCOPE_APP_REQUEST_JOBS:-{}}
      - GREENSCOPE_APP_DISPLAY_NAMES=${GREENSCOPE_APP_DISPLAY_NAMES:-{}}
      - GREENSCOPE_CALCULATION_INTERVAL_MINUTES=${GREENSCOPE_CALCULATION_INTERVAL_MINUTES:-15}
      - GREENSCOPE_DATABASE_URL=${GREENSCOPE_DATABASE_URL:-sqlite+aiosqlite:///data/greenscope.db}
      - GREENSCOPE_LOG_LEVEL=${GREENSCOPE_LOG_LEVEL:-INFO}
    volumes:
      - greenscope_data:/app/data
    networks:
      - web
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  greenscope_data:
