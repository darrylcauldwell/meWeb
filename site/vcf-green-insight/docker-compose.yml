# =============================================================================
# VCF GREEN INSIGHT SERVICES
# =============================================================================
# VCF Green Insight — embodied carbon calculator. Included by main docker-compose files.
# =============================================================================

services:
  vcf-green-insight:
    image: ghcr.io/darrylcauldwell/vcf-green-insight:latest
    container_name: vcf-green-insight
    restart: unless-stopped
    volumes:
      - vcf_green_insight_data:/app/db
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./db/vcf-green-insight.db
    networks:
      - web
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  vcf_green_insight_data:
