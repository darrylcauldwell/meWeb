# =============================================================================
# LOCAL DEVELOPMENT DOCKER COMPOSE
# =============================================================================
# Runs the site on localhost with plain HTTP (no TLS).
# For production deployment, use docker-compose.production.yml instead.
#
# Usage:
#   docker compose up --build
# =============================================================================

include:
  - path: observability/docker-compose.yml
  - path: notifications/docker-compose.yml
  - path: planespotter/docker-compose.yml
  - path: evm/docker-compose.yml
  - path: equicalendar/docker-compose.yml
  - path: greenscope/docker-compose.yml
  - path: showback/docker-compose.yml
  - path: vcf-green-insight/docker-compose.yml

services:
  meweb:
    build: .
    container_name: meweb
    init: true
    restart: unless-stopped
    ports:
      - "127.0.0.1:80:80"
      - "127.0.0.1:443:443"
    environment:
      - SITE_ADDRESS=:80
      - ACME_EMAIL=dev@localhost
      - NTFY_ADDRESS=http://ntfy.localhost
      - WWW_ADDRESS=http://www.localhost
      - CV_ADDRESS=http://cv.localhost
      - BIO_ADDRESS=http://bio.localhost
      - PRESENTATIONS_ADDRESS=http://presentations.localhost
      - BLOG_ADDRESS=http://blog.localhost
      - OBSERVABILITY_ADDRESS=http://observability.localhost
      - SCI_ADDRESS=http://sci.localhost
      - FINOPS_ADDRESS=http://finops.localhost
      - VCF_GREEN_INSIGHT_ADDRESS=http://vcf-green.localhost
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    networks:
      - web

networks:
  web:
    driver: bridge
